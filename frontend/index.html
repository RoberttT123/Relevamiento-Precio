<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Mobile-first: viewport y PWA ─────────────────────────── -->
    <meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
               user-scalable=no, viewport-fit=cover" />

    <!-- Modo standalone en iOS (Safari) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Relevamiento" />

    <!-- Color de la barra del navegador en Android -->
    <meta name="theme-color" content="#1A1A2E" />

    <!-- Manifest PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Ícono para iOS (Safari no lee el manifest) -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Evitar zoom en inputs en iOS -->
    <style>
      input, select, textarea {
        font-size: 16px !important; /* < 16px dispara zoom en iOS */
      }
      /* Safe area para notch y barra de inicio de iPhone */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>

    <title>Relevamiento de Precios — PROESA</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
